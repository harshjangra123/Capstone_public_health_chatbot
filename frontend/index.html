<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F5F3EA] min-h-screen flex items-center">

  <!-- Chat Container -->
  <div class="w-[1000px] bg-white border-2 border-black rounded-2xl shadow-[8px_8px_0px_black] p-4 mx-auto">

    <!-- Messages -->
    <div id="chat" class="h-[400px] overflow-y-auto space-y-3 mb-4"></div>

    <!-- Input -->
    <div class="flex gap-2">
      <input id="messageInput"
        class="flex-1 border-2 border-black rounded-xl px-3 py-2 outline-none"
        placeholder="Type a message..." />

      <button id="sendBtn"
        class="border-2 border-black rounded-xl px-4 py-2 bg-yellow-200 shadow-[4px_4px_0px_black]">
        Send
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
